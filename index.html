<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고급화학 팀 탐구</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --paper:#f5f5f7;--ink:#1d1d1f;--ink-2:#424245;--ink-3:#86868b;
  --rule:#e8e8ed;--tint:#0071e3;
  --sans:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard Variable",Pretendard,system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  display:flex;flex-direction:column;letter-spacing:-0.01em}

/* tab bar */
.tabs{flex:none;background:rgba(245,245,247,.88);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--rule);
  transition:background .35s ease,border-color .35s ease}
.tabs-in{max-width:1180px;margin:0 auto;padding:0 20px;height:52px;
  display:flex;align-items:center;justify-content:space-between;gap:14px}
.brand{display:flex;align-items:center;gap:8px;font-size:14.5px;font-weight:600;
  color:var(--ink);cursor:pointer;background:none;border:none;font-family:var(--sans);transition:color .35s}
.brand svg{color:var(--tint);transition:color .35s}
.tablist{display:flex;gap:3px;overflow-x:auto;scrollbar-width:none}
.tablist::-webkit-scrollbar{display:none}
.tab{font-family:var(--sans);font-size:13.5px;font-weight:500;color:var(--ink-2);
  background:none;border:none;padding:7px 14px;border-radius:980px;cursor:pointer;
  white-space:nowrap;transition:background .16s,color .16s}
.tab:hover{background:rgba(0,0,0,.06);color:var(--ink)}
.tab.on{background:var(--ink);color:#fff}

.whoami{display:flex;align-items:center;gap:9px;flex:none}
.who-name{font-size:12.5px;color:var(--ink-2);white-space:nowrap}
.who-out{font-family:var(--sans);font-size:11.5px;color:var(--ink-3);background:none;border:1px solid var(--rule);
  padding:5px 11px;border-radius:980px;cursor:pointer;transition:.16s;white-space:nowrap}
.who-out:hover{background:#e8e8ed;color:var(--ink)}
body.dark .who-name{color:#aeaeb2}
body.dark .who-out{border-color:#38383a;color:#8e8e93}
body.dark .who-out:hover{background:rgba(255,255,255,.1);color:#f5f5f7}
@media(max-width:700px){.who-name{display:none}}

/* dark mode when simulator active */
body.dark .tabs{background:rgba(0,0,0,.85);border-bottom-color:#38383a}
body.dark .brand{color:#f5f5f7}
body.dark .brand svg{color:#0a84ff}
body.dark .tab{color:#aeaeb2}
body.dark .tab:hover{background:rgba(255,255,255,.1);color:#f5f5f7}
body.dark .tab.on{background:#f5f5f7;color:#000}

/* stage */
.stage{flex:1;position:relative;background:var(--paper);transition:background .35s ease}
body.dark .stage{background:#000}
.stage iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:none;background:transparent}
.stage iframe.on{display:block}

/* loading */
.load{position:absolute;inset:0;display:none;place-items:center;color:var(--ink-3);font-size:14px}
.load.on{display:grid}
body.dark .load{color:#8e8e93}
.spin{width:22px;height:22px;border:2.5px solid var(--rule);border-top-color:var(--tint);
  border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 12px}
body.dark .spin{border-color:#38383a;border-top-color:#0a84ff}
@keyframes sp{to{transform:rotate(360deg)}}

@media(max-width:700px){
  .tabs-in{padding:0 14px;gap:8px}
  .brand span{display:none}
  .tab{padding:7px 11px;font-size:12.5px}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
:focus-visible{outline:2.5px solid var(--tint);outline-offset:-2px}
</style>
</head>
<body>

<div class="tabs"><div class="tabs-in">
  <button class="brand" data-go="home">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6M10 3v6l-4 9a2 2 0 002 3h8a2 2 0 002-3l-4-9V3"/></svg>
    <span>고급화학 탐구</span>
  </button>
  <div class="tablist" id="tablist"></div>
  <div class="whoami" id="whoami"></div>
</div></div>

<div class="stage" id="stage">
  <div class="load" id="load"><div><div class="spin"></div>불러오는 중…</div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-init.js"></script>
<script>
const TABS=[
  {id:"home",     label:"홈",        src:"home.html",    dark:false},
  {id:"sim",      label:"시뮬레이터", src:"sim.html",     dark:true },
  {id:"design",   label:"설계실",     src:"design.html",  dark:false},
  {id:"lab",      label:"기록장",     src:"lab.html",     dark:false},
  {id:"teacher",  label:"현황판",     src:"teacher.html", dark:false}
];
const stage=document.getElementById("stage");
const load=document.getElementById("load");
const frames={};
let current=null;

// 탭 버튼
document.getElementById("tablist").innerHTML=
  TABS.map(t=>`<button class="tab" data-go="${t.id}" id="tab-${t.id}">${t.label}</button>`).join("");

function show(id,frag){
  const t=TABS.find(x=>x.id===id)||TABS[0];
  if(current===t.id && !frag) return;
  current=t.id;

  // 탭 상태
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on",b.dataset.go===t.id));
  document.body.classList.toggle("dark",t.dark);

  // iframe 준비 (한 번 만든 건 계속 살려둠 → 입력·스크롤 유지)
  if(!frames[t.id]){
    const f=document.createElement("iframe");
    f.src=t.src+(frag?"#"+frag:"");
    f.title=t.label;
    f.loading="eager";
    load.classList.add("on");
    f.addEventListener("load",()=>load.classList.remove("on"),{once:true});
    stage.appendChild(f);
    frames[t.id]=f;
  } else if(frag){
    // 이미 로드된 탭이면 해당 위치로만 이동
    try{ frames[t.id].contentWindow.postMessage({t:"goFrag",frag:frag},"*"); }catch(e){}
  }

  Object.entries(frames).forEach(([k,f])=>f.classList.toggle("on",k===t.id));
  document.title=(t.id==="home"?"":t.label+" · ")+"고급화학 팀 탐구";
}

function fromHash(){
  const raw=(location.hash||"#home").slice(1);
  const [id,frag]=raw.split("::");
  show(id||"home",frag);
}

document.addEventListener("click",e=>{
  const btn=e.target.closest("[data-go]");
  if(!btn) return;
  location.hash=btn.dataset.go;
});
window.addEventListener("message",e=>{
  if(e.data&&e.data.t==="goTab"){
    location.hash=e.data.id+(e.data.frag?"::"+e.data.frag:"");
  }
});
window.addEventListener("hashchange",fromHash);

function renderWhoami(me){
  document.getElementById("whoami").innerHTML=
    `<span class="who-name">${me.name}${me.isAdmin?" · 관리자":""}</span>
     <button class="who-out" id="logoutBtn">로그아웃</button>`;
  document.getElementById("logoutBtn").onclick=()=>AUTH.logout();
}

LoginGate.inject((me)=>{
  renderWhoami(me);
  fromHash();
});
</script>
</body>
</html>
